<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talksy AI</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-container">

        <!--Header-->
        <header>
            <div class="logo-section">
                <img src="Talksy AI.jpg" alt="Talksy AI">
            <div>
            <h2>Talksy AI</h2>
            <p>Emglish to French Translator</p>
        </div>
    </div>
    <button id="installBtn" class="install-btn"  style=>Install App</button>
    </header>

    <!--Chat Message-->
    <div id="chatBox" class="chat-box">

        <div class="bot-message">
            Bonjour <br>
            Enter English text and I ll translate it to french.
        </div>
    </div>

    <!--Input area-->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="
        Type English text....">
        <button id="sendBtn">Send</button>
    </div>
    </div>

    <script src="app.js"></script>
    
</body>
</html>
